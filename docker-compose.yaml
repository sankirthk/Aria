services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - ./backend/src:/app/src
      - ./backend/logs:/app/logs
      - ./backend/prisma:/app/prisma
    env_file:
      - ./backend/.env
    networks:
      - kyron_medical_net

  frontend:
    build:
      context: ./frontend/kyron-medical
      dockerfile: Dockerfile.frontend
    container_name: frontend
    restart: always
    ports:
      - "3000:5173"
    volumes:
      - ./frontend/kyron-medical/src:/app/src
    env_file:
      - ./frontend/kyron-medical/.env
    networks:
      - kyron_medical_net
  postgres:
    image: postgres:17.5
    container_name: db
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - kyron_medical_net

volumes:
  pgdata:

networks:
  kyron_medical_net:
